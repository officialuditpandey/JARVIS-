<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Cowork HUD - Refined JARVIS Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f1, #1a1a2e);
            color: #ffffff;
            overflow: hidden;
        }

        body {
            background: transparent;
            backdrop-filter: blur(20px);
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            width: 95vw;
            height: 95vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .hud-container {
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 1400px;
            height: 80vh;
            padding: 2rem;
            position: relative;
            animation: fadeIn 0.5s ease-out;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hud-title {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(45deg, #00ff88, #00aa66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .toggle-switch.active {
            background: linear-gradient(45deg, #00ff88, #00cc66);
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(30px);
        }

        .status-bar {
            background: rgba(0, 0, 0, 0.8);
            height: 4px;
            border-radius: 10px;
            margin: 1rem 0;
            position: relative;
            overflow: hidden;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 10px rgba(0, 255, 255, 0.8); }
            50% { box-shadow: 0 0 0 20px rgba(0, 255, 255, 1); }
            100% { box-shadow: 0 0 0 10px rgba(0, 255, 255, 0.8); }
        }

        .thinking-indicator {
            animation: pulse 1.5s infinite;
            background: #00ffff;
        }

        .main-content {
            display: flex;
            gap: 2rem;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .action-button {
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-button:hover {
            background: linear-gradient(45deg, #00cc66, #009944);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .vision-card {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            flex: 1;
        }

        .vision-feed {
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 10px;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .ai-chat {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            padding: 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1rem;
            max-height: 300px;
        }

        .message {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai {
            background: rgba(0, 255, 255, 0.05);
            border-left: 3px solid #00ffff;
        }

        .message.system {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #00ff88;
        }

        .message.personal {
            background: rgba(255, 200, 0, 0.1);
            border-left: 3px solid #ffcc00;
        }

        .floating-input-bar {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 0.75rem 1rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00ff88;
        }

        .send-button {
            background: linear-gradient(45deg, #00ff88, #00cc66);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .send-button:hover {
            background: linear-gradient(45deg, #00cc66, #009944);
            transform: translateY(-2px);
        }

        .jarvis-logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #00ff88, #00cc66);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            position: relative;
            overflow: hidden;
        }

        .jarvis-logo.speaking {
            animation: speakingPulse 1s infinite;
        }

        @keyframes speakingPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .jarvis-logo::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ff88, #00cc66, #00ff88);
            border-radius: 50%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .jarvis-logo.speaking::before {
            opacity: 1;
            animation: rotate 2s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .routing-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .routing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
        }

        .routing-dot.personal {
            background: #ffcc00;
        }

        .routing-dot.general {
            background: #00ffff;
        }

        .notification {
            background: rgba(0, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-left: 3px solid #00ff88;
        }

        .notification.info { border-left-color: #00ff88; }
        .notification.success { border-left-color: #00ff00; }
        .notification.error { border-left-color: #ff0000; }
        .notification.ai { border-left-color: #00ffff; }

        .notification-title {
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 0.25rem;
        }

        .notification-message {
            color: #cccccc;
            font-size: 0.9rem;
        }

        .stats-panel {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            color: #cccccc;
        }

        .stat-value {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <div class="hud-header">
            <div class="hud-title">
                <div class="jarvis-logo" id="jarvisLogo">J</div>
                CLOUD COWORK HUD
            </div>
            <div class="mode-toggle">
                <span id="modeText">Manual Control</span>
                <div class="toggle-switch" id="modeToggle" onclick="toggleMode()">
                    <div class="toggle-slider"></div>
                </div>
                <span>Autonomous Coworker</span>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">JARVIS Online</span>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="action-grid">
                    <button class="action-button" onclick="executeAction('system_scan')">
                        <span>System Scan</span>
                    </button>
                    <button class="action-button" onclick="executeAction('volume_up')">
                        <span>Volume Up</span>
                    </button>
                    <button class="action-button" onclick="executeAction('volume_down')">
                        <span>Volume Down</span>
                    </button>
                    <button class="action-button" onclick="executeAction('brightness_up')">
                        <span>Brightness Up</span>
                    </button>
                    <button class="action-button" onclick="executeAction('brightness_down')">
                        <span>Brightness Down</span>
                    </button>
                    <button class="action-button" onclick="executeAction('whatsapp')">
                        <span>WhatsApp</span>
                    </button>
                    <button class="action-button" onclick="executeAction('vision_toggle')">
                        <span>Vision Feed</span>
                    </button>
                    <button class="action-button" onclick="executeAction('settings')">
                        <span>Settings</span>
                    </button>
                </div>

                <div class="vision-card">
                    <h3 style="color: #00ff88; margin-bottom: 1rem;">Vision Portal</h3>
                    <div class="vision-feed" id="visionFeed">
                        <video id="cameraFeed" autoplay muted style="width: 100%; height: 100%; object-fit: cover;"></video>
                        <canvas id="visionCanvas" style="display: none;"></canvas>
                    </div>
                    <div style="margin-top: 1rem; display: flex; gap: 1rem; justify-content: center;">
                        <button class="action-button" onclick="toggleVisionFeed()" style="flex: 1;">
                            <span id="visionToggleText">Start Feed</span>
                        </button>
                        <button class="action-button" onclick="analyzeVision()" style="flex: 1;">
                            <span>Analyze</span>
                        </button>
                    </div>
                </div>

                <div class="stats-panel">
                    <h4 style="color: #00ff88; margin-bottom: 1rem;">Routing Statistics</h4>
                    <div class="stat-item">
                        <span class="stat-label">Total Commands</span>
                        <span class="stat-value" id="totalCommands">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Personal (Local)</span>
                        <span class="stat-value" id="personalCommands">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">General (Gemini)</span>
                        <span class="stat-value" id="generalCommands">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Personal %</span>
                        <span class="stat-value" id="personalPercentage">0%</span>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="ai-chat">
                    <h3 style="color: #00ff88; margin-bottom: 1rem;">JARVIS AI</h3>
                    <div class="routing-indicator" id="routingIndicator">
                        <div class="routing-dot" id="routingDot"></div>
                        <span id="routingSource">Ready</span>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message system">
                            <div class="notification-title">SYSTEM</div>
                            <div class="notification-message">Cloud Cowork HUD initialized with Hybrid Router ready.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="floating-input-bar">
            <input type="text" class="input-field" id="chatInput" placeholder="Ask JARVIS anything..." onkeypress="handleKeyPress(event)">
            <button class="send-button" onclick="sendChatMessage()">Send</button>
        </div>
    </div>

    <script>
        let isThinking = false;
        let visionStream = null;
        let isAutonomous = false;
        let currentRoutingSource = 'Ready';

        function updateStatus(status, text = '') {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            
            if (status === 'thinking' || status === 'processing') {
                indicator.classList.add('thinking-indicator');
                statusText.textContent = text || 'Processing...';
            } else {
                indicator.classList.remove('thinking-indicator');
                statusText.textContent = text || 'Ready';
            }
        }

        function showJarvisSpeaking() {
            const logo = document.getElementById('jarvisLogo');
            logo.classList.add('speaking');
            setTimeout(() => {
                logo.classList.remove('speaking');
            }, 2000);
        }

        function updateRoutingIndicator(source, isPersonal = false) {
            const indicator = document.getElementById('routingIndicator');
            const dot = document.getElementById('routingDot');
            const sourceText = document.getElementById('routingSource');
            
            currentRoutingSource = source;
            sourceText.textContent = source;
            
            // Update dot color based on routing
            dot.className = 'routing-dot';
            if (isPersonal) {
                dot.classList.add('personal');
            } else if (source === 'Gemini') {
                dot.classList.add('general');
            }
        }

        function addChatMessage(message, type = 'user', routing = null) {
            const messages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            let content = message;
            if (routing) {
                content += ` <small style="opacity: 0.7;">[${routing}]</small>`;
            }
            
            messageDiv.innerHTML = `<div style="margin-bottom: 0.5rem;">${content}</div>`;
            messages.appendChild(messageDiv);
            messages.scrollTop = messages.scrollHeight;
            
            // Keep only last 30 messages
            while (messages.children.length > 30) {
                messages.removeChild(messages.firstChild);
            }
        }

        function updateStats(stats) {
            document.getElementById('totalCommands').textContent = stats.total || 0;
            document.getElementById('personalCommands').textContent = stats.personal || 0;
            document.getElementById('generalCommands').textContent = stats.general || 0;
            document.getElementById('personalPercentage').textContent = (stats.personal_percentage || 0) + '%';
        }

        function toggleMode() {
            const toggle = document.getElementById('modeToggle');
            const modeText = document.getElementById('modeText');
            
            isAutonomous = !isAutonomous;
            
            if (isAutonomous) {
                toggle.classList.add('active');
                modeText.textContent = 'Autonomous Coworker';
                addChatMessage('Switched to Autonomous Coworker mode', 'system');
            } else {
                toggle.classList.remove('active');
                modeText.textContent = 'Manual Control';
                addChatMessage('Switched to Manual Control mode', 'system');
            }
        }

        function executeAction(action) {
            updateStatus('processing', `Executing ${action}...`);
            
            fetch('/api/execute_action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addChatMessage(`Action ${action} completed: ${data.result}`, 'system');
                } else {
                    addChatMessage(`Action ${action} failed: ${data.error}`, 'system');
                }
                updateStatus('ready');
            })
            .catch(error => {
                addChatMessage(`Network error: ${error}`, 'system');
                updateStatus('ready');
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            updateStatus('thinking', 'Processing your request...');
            addChatMessage(`You: ${message}`, 'user');
            
            fetch('/api/chat_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const isPersonal = data.routing === 'Local';
                    addChatMessage(`JARVIS: ${data.response}`, 'ai', data.routing);
                    updateRoutingIndicator(data.routing, isPersonal);
                    showJarvisSpeaking();
                    
                    // Update stats if available
                    if (data.stats) {
                        updateStats(data.stats);
                    }
                } else {
                    addChatMessage(`Error: ${data.error}`, 'system');
                }
                updateStatus('ready');
            })
            .catch(error => {
                addChatMessage(`Network error: ${error}`, 'system');
                updateStatus('ready');
            });
            
            input.value = '';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function toggleVisionFeed() {
            const video = document.getElementById('cameraFeed');
            const toggleText = document.getElementById('visionToggleText');
            
            if (visionStream) {
                visionStream.getTracks().forEach(track => track.stop());
                visionStream = null;
                video.srcObject = '';
                toggleText.textContent = 'Start Feed';
                addChatMessage('Camera feed stopped', 'system');
            } else {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(stream => {
                    visionStream = stream;
                    video.srcObject = URL.createObjectURL(stream);
                    toggleText.textContent = 'Stop Feed';
                    addChatMessage('Camera feed started', 'system');
                })
                .catch(error => {
                    addChatMessage(`Camera access denied: ${error.message}`, 'system');
                });
            }
        }

        function analyzeVision() {
            const canvas = document.getElementById('visionCanvas');
            const video = document.getElementById('cameraFeed');
            
            if (!visionStream) {
                addChatMessage('Please start the camera feed first', 'system');
                return;
            }
            
            updateStatus('thinking', 'Analyzing vision...');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Send frame for analysis
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('frame', blob);
                
                fetch('/api/analyze_vision', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        addChatMessage(`Vision Analysis: ${data.result}`, 'ai', 'Vision');
                        showJarvisSpeaking();
                    } else {
                        addChatMessage(`Vision Error: ${data.error}`, 'system');
                    }
                    updateStatus('ready');
                });
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('ready', 'JARVIS HUD Online');
            
            // Request camera permissions
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(stream => {
                    // Don't start automatically, just check permissions
                    stream.getTracks().forEach(track => track.stop());
                })
                .catch(error => {
                    addChatMessage(`Camera permissions: ${error.message}`, 'system');
                });
            
            // Load initial stats
            fetch('/api/get_stats')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        updateStats(data.stats);
                    }
                });
        });

        // Auto-refresh stats
        setInterval(() => {
            fetch('/api/get_stats')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        updateStats(data.stats);
                    }
                });
        }, 10000);
    </script>
</body>
</html>
